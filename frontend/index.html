<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sanctum</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script>
    // Set theme before React mounts — prevents flash of wrong theme
    var theme = window.location.pathname.startsWith('/garden')
      ? (localStorage.getItem('grd_theme') || 'shadow')
      : 'sanctum';
    document.documentElement.setAttribute('data-theme', theme);
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;900&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
