services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gardeners
      POSTGRES_PASSWORD: gardeners
      POSTGRES_DB: gardeners_dev
    ports:
      - "5433:5432"   # host 5433 → container 5432 (avoids conflict with existing DB)
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
